<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor QRIS Mandiri</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; padding: 24px; }
    .container { max-width: 860px; margin: auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
    .kartu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .kartu { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; }
    .kartu .label { font-size: 13px; color: #64748b; margin-bottom: 6px; }
    .kartu .nilai { font-size: 22px; font-weight: 600; color: #0f172a; }
    .kartu .nilai.hijau { color: #059669; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
    th { background: #f1f5f9; padding: 12px 16px; text-align: left; font-size: 13px; color: #475569; font-weight: 500; }
    td { padding: 12px 16px; border-top: 1px solid #f1f5f9; font-size: 14px; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; background: #dcfce7; color: #166534; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .filter { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    select { border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 10px; font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Monitor Transaksi QRIS Mandiri</h1>

  <div class="kartu-grid">
    <div class="kartu">
      <div class="label">Total Bulan Ini</div>
      <div class="nilai hijau" id="totalBulanIni">Rp 0</div>
    </div>
    <div class="kartu">
      <div class="label">Jumlah Transaksi</div>
      <div class="nilai" id="jumlahTransaksi">0</div>
    </div>
    <div class="kartu">
      <div class="label">Rata-rata per Transaksi</div>
      <div class="nilai" id="rataRata">Rp 0</div>
    </div>
  </div>

  <div class="filter">
    <label style="font-size:14px;color:#64748b">Filter:</label>
    <select id="filterBulan"></select>
  </div>

  <table>
    <thead>
      <tr><th>Tanggal</th><th>Deskripsi</th><th>Nominal</th></tr>
    </thead>
    <tbody id="tabelData">
      <tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:32px">Memuat data...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const rp = n => 'Rp ' + parseInt(n).toLocaleString('id-ID');
  
  async function muatData(bulan, tahun) {
    let url = '/api/transaksi';
    if (bulan && tahun) url += `?bulan=${bulan}&tahun=${tahun}`;
    
    const res = await fetch(url);
    const data = await res.json();
    
    const tbody = document.getElementById('tabelData');
    tbody.innerHTML = '';
    
    let total = 0;
    data.forEach(item => {
      total += item.nominal;
      tbody.innerHTML += `<tr>
        <td>${item.tanggal}</td>
        <td>${item.deskripsi} <span class="badge">QRIS</span></td>
        <td style="font-weight:500">${rp(item.nominal)}</td>
      </tr>`;
    });
    
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:32px">Belum ada transaksi</td></tr>';
    }
    
    document.getElementById('totalBulanIni').textContent = rp(total);
    document.getElementById('jumlahTransaksi').textContent = data.length + ' transaksi';
    document.getElementById('rataRata').textContent = data.length > 0 ? rp(Math.round(total / data.length)) : 'Rp 0';
  }
  
  // Isi dropdown bulan
  const now = new Date();
  const filterEl = document.getElementById('filterBulan');
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const opt = document.createElement('option');
    opt.value = `${d.getMonth() + 1}|${d.getFullYear()}`;
    opt.textContent = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
    if (i === 0) opt.selected = true;
    filterEl.appendChild(opt);
  }
  
  filterEl.addEventListener('change', () => {
    const [bulan, tahun] = filterEl.value.split('|');
    muatData(bulan, tahun);
  });
  
  const [initBulan, initTahun] = filterEl.value.split('|');
  muatData(initBulan, initTahun);
  setInterval(() => {
    const [b, t] = filterEl.value.split('|');
    muatData(b, t);
  }, 15000);
</script>
</body>
</html>
